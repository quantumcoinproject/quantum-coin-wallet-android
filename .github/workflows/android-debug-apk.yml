name: Quantum Coin Wallet (debug)

env:
  main_project_module: app

on:
  push:
    tags:
      - '*'
  # Allow manually running a debug build for verification without pushing a tag.
  workflow_dispatch: {}

jobs:
  BuildArtifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Verify APK is signed
        run: |
          APK_DIR="${{ env.main_project_module }}/build/outputs/apk/debug"
          APK_FILE=$(ls "${APK_DIR}"/*.apk | head -n 1)
          echo "Verifying ${APK_FILE}"
          "${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools | sort -V | tail -n 1)/apksigner" verify --verbose "${APK_FILE}"

      - name: List built APK
        run: ls -la ${{ env.main_project_module }}/build/outputs/apk/debug/

      - name: Upload Quantum Coin Wallet debug APK
        uses: actions/upload-artifact@v6
        with:
          name: quantum-coin-wallet-debug
          path: ${{ env.main_project_module }}/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  Release:
    name: Release APK
    runs-on: ubuntu-latest
    needs: BuildArtifacts
    if: success() && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Generate version string
        id: version-string
        run: echo "VERSION_STR=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: quantum-coin-wallet-debug
          path: ./artifacts

      - name: List downloaded artifacts
        run: ls -la ./artifacts/

      - name: Create a release APK
        uses: ncipollo/release-action@v1
        with:
          # L-10: refuse to overwrite an existing tag. If a tag is re-run
          # intentionally, the operator must delete the previous release
          # first so that the supply chain cannot be quietly reassigned.
          allowUpdates: false
          replacesArtifacts: false
          artifacts: "./artifacts/*.apk"
          artifactContentType: application/vnd.android.package-archive
          name: Release ${{ steps.version-string.outputs.VERSION_STR }} (debug)
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          tag: ${{ steps.version-string.outputs.VERSION_STR }}
          token: ${{ secrets.GITHUB_TOKEN }}
