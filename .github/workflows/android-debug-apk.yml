name: Quantum Coin Wallet (debug)

env:
  main_project_module: app

on:
  push:
    tags:
      - '*'
  # Allow manually running a debug build for verification without pushing a tag.
  workflow_dispatch: {}

jobs:
  BuildArtifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: ./gradlew assembleDebug --stacktrace --no-daemon --warning-mode=all

      # When the build fails, surface as much of Gradle's own diagnostics as
      # possible directly in the job log so that the failure can be diagnosed
      # without admin access to raw action logs. Anything larger (the full HTML
      # report tree) is still uploaded as an artifact in the next step.
      - name: Dump Gradle failure diagnostics
        if: ${{ failure() && steps.build.conclusion == 'failure' }}
        shell: bash
        run: |
          set +e
          echo "::group::Environment"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          java -version
          ./gradlew --version || true
          echo "::endgroup::"

          echo "::group::Build reports tree"
          find . -type d \( -path "*/build/reports*" -o -path "*/build/outputs/logs*" \) | sort
          echo "::endgroup::"

          # Gradle writes one dependency-verification report per attempt under
          # build/reports/dependency-verification/at-<ts>/. Pick the newest one
          # and print a plain-text excerpt so the failure reason is visible
          # directly in the job log (downloadable logs require admin access).
          echo "::group::Dependency verification report (plain-text excerpt)"
          latest_dv_report=$(find . -type f -path "*/build/reports/dependency-verification/at-*/dependency-verification-report.html" -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -n 1 | cut -d' ' -f2-)
          if [ -n "${latest_dv_report}" ]; then
            echo "Report file: ${latest_dv_report}"
            sed -e 's/<[^>]*>/ /g' -e 's/&nbsp;/ /g' "${latest_dv_report}" \
              | tr -s ' \t\n' ' ' \
              | fold -s -w 160 \
              | sed -n '1,200p'
          else
            echo "No dependency-verification report was produced."
          fi
          echo "::endgroup::"

          echo "::group::Problems report (if any)"
          problems_report=$(find . -type f -name "problems-report.html" -path "*/build/reports/*" | head -n 1)
          if [ -n "${problems_report}" ]; then
            echo "Report file: ${problems_report}"
            sed -e 's/<[^>]*>/ /g' -e 's/&nbsp;/ /g' "${problems_report}" \
              | tr -s ' \t\n' ' ' \
              | fold -s -w 160 \
              | sed -n '1,120p'
          else
            echo "No problems report found."
          fi
          echo "::endgroup::"

      - name: Upload build reports on failure
        if: ${{ failure() && steps.build.conclusion == 'failure' }}
        uses: actions/upload-artifact@v6
        with:
          name: build-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Verify APK is signed
        run: |
          APK_DIR="${{ env.main_project_module }}/build/outputs/apk/debug"
          APK_FILE=$(ls "${APK_DIR}"/*.apk | head -n 1)
          echo "Verifying ${APK_FILE}"
          "${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools | sort -V | tail -n 1)/apksigner" verify --verbose "${APK_FILE}"

      - name: List built APK
        run: ls -la ${{ env.main_project_module }}/build/outputs/apk/debug/

      - name: Upload Quantum Coin Wallet debug APK
        uses: actions/upload-artifact@v6
        with:
          name: quantum-coin-wallet-debug
          path: ${{ env.main_project_module }}/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  DebugBuild:
    name: Debug APK
    runs-on: ubuntu-latest
    needs: BuildArtifacts
    if: success() && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Generate version string
        id: version-string
        run: echo "VERSION_STR=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        uses: actions/download-artifact@v7
        with:
          name: quantum-coin-wallet-debug
          path: ./artifacts

      - name: List downloaded artifacts
        run: ls -la ./artifacts/

      - name: Create a Debug APK
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: false
          artifacts: "./artifacts/*.apk"
          artifactContentType: application/vnd.android.package-archive
          name: Release ${{ steps.version-string.outputs.VERSION_STR }} (debug)
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          tag: ${{ steps.version-string.outputs.VERSION_STR }}
          token: ${{ secrets.GITHUB_TOKEN }}
