name: Quantum Coin Wallet
env:
  main_project_module: app
on:
  push:
    tags:
    - '*'
jobs:
  BuildArtifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Quantum Coin Wallet APK - ${{ env.main_project_module }} module
        run: ./gradlew assembleDebug --stacktrace
      - name: List built APK
        run: ls -la ${{ env.main_project_module }}/build/outputs/apk/debug/
      - name: Upload Quantum Coin Wallet APK
        uses: actions/upload-artifact@v6
        with:
          name: quantum-coin-wallet-debug
          path: ${{ env.main_project_module }}/build/outputs/apk/debug/*.apk
          if-no-files-found: error
  Release:
    name: Release APK
    runs-on: ubuntu-latest
    needs: BuildArtifacts
    if: success() && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Generate version string
        id: version-string
        run: echo "VERSION_STR=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        uses: actions/download-artifact@v7
        with:
          name: quantum-coin-wallet-debug
          path: ./artifacts

      - name: List downloaded artifacts
        run: ls -la ./artifacts/

      - name: Create a release APK
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "./artifacts/*.apk"
          artifactContentType: application/vnd.android.package-archive
          name: Release ${{ steps.version-string.outputs.VERSION_STR }}
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          tag: ${{ steps.version-string.outputs.VERSION_STR }}
          token: ${{ secrets.GITHUB_TOKEN }}
